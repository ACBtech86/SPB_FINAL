<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Finvest DTVM SPB</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">

    <style>
        body.login-body {
            background: linear-gradient(135deg, #004a6d 0%, #006890 50%, #008bd6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }
        body.login-body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: drift 20s linear infinite;
        }
        @keyframes drift {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }
        .login-card {
            box-shadow: 0 20px 60px rgba(0, 74, 109, 0.4);
            border: none;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.98);
        }
        .login-header {
            background: linear-gradient(135deg, #004a6d 0%, #006890 100%);
            color: white;
            padding: 32px;
            border-radius: 12px 12px 0 0;
            margin: -24px -24px 24px -24px;
        }
        .login-header h2 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .login-header p {
            color: rgba(255, 255, 255, 0.9);
            margin: 0;
        }
        .form-label-finvest {
            color: #004a6d;
            font-weight: 600;
            font-size: 1.05rem;
        }
        .input-group-text-finvest {
            background: linear-gradient(135deg, #004a6d 0%, #006890 100%);
            color: white;
            border: none;
            padding: 12px 16px;
        }
        .form-control-finvest {
            border: 2px solid #dee2e6;
            padding: 12px;
            font-size: 1rem;
        }
        .form-control-finvest:focus {
            border-color: #008bd6;
            box-shadow: 0 0 0 0.2rem rgba(0, 139, 214, 0.15);
        }
        .btn-login-finvest {
            background: linear-gradient(135deg, #004a6d 0%, #006890 100%);
            border: none;
            padding: 14px;
            font-size: 1.2rem;
            font-weight: 600;
            box-shadow: 0 6px 20px rgba(0, 74, 109, 0.3);
            transition: all 0.3s ease;
        }
        .btn-login-finvest:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 74, 109, 0.4);
            background: linear-gradient(135deg, #006890 0%, #008bd6 100%);
        }
        .footer-login {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.1);
            padding: 12px 20px;
            border-radius: 8px;
        }
    </style>
</head>
<body class="login-body">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card login-card">
                    <div class="card-body p-4">
                        <!-- Header -->
                        <div class="login-header text-center">
                            <h2><i class="bi bi-shield-lock me-2"></i>Finvest DTVM</h2>
                            <p>Sistema de Pagamentos Brasileiro</p>
                        </div>

                        <!-- Error Alert -->
                        {% if error %}
                        <div class="alert alert-danger alert-dismissible fade show" role="alert">
                            <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ error }}
                        </div>
                        {% endif %}

                        <!-- Login Form -->
                        <form method="post" action="/login">
                            <div class="mb-4">
                                <label for="username" class="form-label form-label-finvest">
                                    <i class="bi bi-person-circle me-2"></i>Usuário
                                </label>
                                <div class="input-group">
                                    <span class="input-group-text input-group-text-finvest">
                                        <i class="bi bi-person fs-5"></i>
                                    </span>
                                    <input type="text" class="form-control form-control-finvest" id="username" name="username"
                                           placeholder="Digite seu usuário" required autofocus>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="password" class="form-label form-label-finvest">
                                    <i class="bi bi-key me-2"></i>Senha
                                </label>
                                <div class="input-group">
                                    <span class="input-group-text input-group-text-finvest">
                                        <i class="bi bi-lock fs-5"></i>
                                    </span>
                                    <input type="password" class="form-control form-control-finvest" id="password" name="password"
                                           placeholder="Digite sua senha" required>
                                </div>
                            </div>

                            <div class="d-grid mt-4">
                                <button type="submit" class="btn btn-login-finvest">
                                    <i class="bi bi-box-arrow-in-right me-2"></i>Entrar no Sistema
                                </button>
                            </div>
                        </form>

                        <div class="text-center mt-4 pt-3" style="border-top: 2px solid #dee2e6;">
                            <small style="color: #6c757d;">
                                <i class="bi bi-shield-check me-1" style="color: #008bd6;"></i>
                                Acesso seguro e criptografado
                            </small>
                        </div>
                    </div>
                </div>

                <!-- Footer -->
                <div class="text-center mt-4 footer-login">
                    <small class="text-white fw-semibold">
                        <i class="bi bi-c-circle me-1"></i>2026 Finvest DTVM - Todos os direitos reservados
                    </small>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
</body>
</html>
