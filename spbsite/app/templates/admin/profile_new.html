{% extends "base.html" %}

{% block title %}Novo Perfil{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-12">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2><i class="bi bi-plus-circle"></i> Criar Novo Perfil</h2>
                <a href="/admin/profiles" class="btn btn-secondary">
                    <i class="bi bi-arrow-left"></i> Voltar
                </a>
            </div>

            {% if request.query_params.get('error') == 'name_required' %}
            <div class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="bi bi-exclamation-triangle"></i> O nome do perfil é obrigatório!
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endif %}

            <div class="card">
                <div class="card-body">
                    <form method="POST" action="/admin/profiles/create">
                        <div class="mb-3">
                            <label for="name" class="form-label">Nome do Perfil <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="name" name="name" required>
                        </div>

                        <div class="mb-3">
                            <label for="description" class="form-label">Descrição</label>
                            <textarea class="form-control" id="description" name="description" rows="3"></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Mensagens Permitidas</label>
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="checkbox" id="selectAll">
                                <label class="form-check-label" for="selectAll">
                                    <strong>Selecionar / Desselecionar Todas</strong>
                                </label>
                            </div>

                            <div class="mb-3">
                                <input type="text" class="form-control" id="searchMessages" placeholder="Buscar mensagens...">
                            </div>

                            <div class="row" id="messagesList" style="max-height: 400px; overflow-y: auto;">
                                {% for msg in all_messages %}
                                <div class="col-md-3 message-item">
                                    <div class="form-check">
                                        <input
                                            class="form-check-input message-checkbox"
                                            type="checkbox"
                                            name="msg_ids"
                                            value="{{ msg.msg_id }}"
                                            id="msg_{{ msg.msg_id }}"
                                        >
                                        <label class="form-check-label" for="msg_{{ msg.msg_id }}">
                                            {{ msg.msg_id }}
                                        </label>
                                    </div>
                                </div>
                                {% endfor %}
                            </div>
                        </div>

                        <div class="mt-4">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save"></i> Criar Perfil
                            </button>
                            <a href="/admin/profiles" class="btn btn-secondary">
                                <i class="bi bi-x-circle"></i> Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Select/Deselect all checkboxes
document.getElementById('selectAll').addEventListener('change', function() {
    const checkboxes = document.querySelectorAll('.message-checkbox');
    checkboxes.forEach(cb => cb.checked = this.checked);
});

// Search functionality
document.getElementById('searchMessages').addEventListener('input', function(e) {
    const searchTerm = e.target.value.toLowerCase();
    const items = document.querySelectorAll('.message-item');

    items.forEach(item => {
        const label = item.querySelector('label').textContent.toLowerCase();
        if (label.includes(searchTerm)) {
            item.style.display = '';
        } else {
            item.style.display = 'none';
        }
    });
});
</script>
{% endblock %}
